<!doctype html>
<html lang="pl">
  <head>
    <base href="/members/module/kalkulator/" />
    <link rel="icon" href="https://cdn.jsdelivr.net/gh/Kuczis-Media/logo/benzene-ring.svg" type="image/svg+xml">
    <meta charset="utf-8" />
    <meta name="x-members" content="1" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Kalkulator - ChemDisk</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <script src="/assets/js/auth.js"></script>
    <link rel="stylesheet" href="./style.css" />
    <script defer src="./script.js"></script>
  </head>
  <body>
    <div class="viewport">
      <div class="status" id="status" role="status" aria-live="polite">
        <span class="spinner" aria-hidden="true"></span>
        <span id="statusText">Ładowanie kalkulatora…</span>
        <button id="retry" type="button" hidden>Spróbuj ponownie</button>
      </div>
      <iframe
        id="calculator"
        data-src="https://www.numworks.com/simulator/embed/"
        title="Kalkulator NumWorks"
        allow="clipboard-read; clipboard-write; fullscreen"
        allowfullscreen
        loading="eager"
        referrerpolicy="no-referrer"
        sandbox="allow-scripts allow-same-origin allow-downloads"
      ></iframe>
    </div>
  </body>
</html>
